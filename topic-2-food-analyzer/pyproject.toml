[tool.pytest.ini_options]
addopts = "-p no:cacheprovider"
asyncio_mode = "strict"
testpaths = ["tests"]

[tool.coverage.run]
branch = true
source = ["src"]
omit = ["src/api.py"]

[tool.coverage.report]
show_missing = true
fail_under = 85

[tool.mypy]
python_version = "3.12"
ignore_missing_imports = true
check_untyped_defs = true
warn_return_any = false
warn_unused_ignores = true
exclude = ["^ai/"]

[[tool.mypy.overrides]]
module = ["ai", "ai.*"]
follow_imports = "skip"
ignore_errors = true
