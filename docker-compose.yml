services:
  db:
    image: postgres:16
    container_name: foodanalyzer-db
    environment:
      POSTGRES_DB: foodanalyzer
      POSTGRES_USER: foodanalyzer
      POSTGRES_PASSWORD: foodanalyzer
    ports:
      - "5432:5432"
    volumes:
      - foodanalyzer_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foodanalyzer -d foodanalyzer"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    container_name: foodanalyzer-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      STORAGE_BACKEND: postgres
      NUTRITION_CACHE_BACKEND: postgres
      DATABASE_URL: postgresql://foodanalyzer:foodanalyzer@db:5432/foodanalyzer
    depends_on:
      db:
        condition: service_healthy

volumes:
  foodanalyzer_pgdata: